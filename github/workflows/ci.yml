name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupère le code
        uses: actions/checkout@v3

      - name: Installe Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Installe les dépendances backend
        run: |
          cd backend
          npm install

      - name: Build Docker image
        run: docker build -t todo-backend ./backend